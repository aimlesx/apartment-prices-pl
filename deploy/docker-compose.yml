# Stack produkcyjny lokalnie: API + Prometheus + Grafana.
# Uruchom z korzenia repo:  make up   (lub: docker compose -f deploy/docker-compose.yml up --build)
#
# WYMAGANIE: najpierw `make export-model` — eksportuje model @production z rejestru MLflow
# do deploy/model/ (montowany do kontenera API). MLflow UI uruchamiamy lokalnie: `make mlflow-ui`.

services:
  api:
    build:
      context: ..
      dockerfile: serving/Dockerfile
    image: apartment-api:latest
    container_name: apartment-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_URI=/app/model
    volumes:
      - ./model:/app/model:ro # wyeksportowany artefakt modelu (make export-model)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mlops

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - mlops

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mlops

volumes:
  grafana-data:

networks:
  mlops:
    driver: bridge
