name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      DO_NOT_TRACK: "1"          # wyłącz telemetrię kedro w CI
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: System deps (libgomp dla LightGBM)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1

      - name: Install workspace (frozen lock, all packages)
        run: uv sync --all-packages --frozen

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test (pytest)
        run: uv run pytest
