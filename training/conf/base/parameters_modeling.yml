# Parametry pipeline'u modeling.
split:
  target: price
  group_col: id          # podział grupowy po id (kontrola wycieku tożsamości)
  test_size: 0.2
  random_state: 42

model:
  lgbm:                  # domyślne hiperparametry baseline (etap 4 stroi je Optuną)
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 31
    random_state: 42
    verbose: -1
