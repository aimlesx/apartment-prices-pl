# Konfiguracja kedro-mlflow.
# Backend SQLite (a nie plikowy ./mlruns) - wymagany przez MLflow Model Registry (etap 4).
# W etapie 5 (docker-compose) tracking URI wskaże serwer MLflow.
server:
  mlflow_tracking_uri: sqlite:///mlflow.db
  mlflow_registry_uri: sqlite:///mlflow.db

tracking:
  experiment:
    name: apartment-prices
  # Logowanie do MLflow robimy jawnie w węzłach pipeline'u optimization - wyłączamy
  # automatyczne runy kedro-mlflow, by uniknąć podwójnego/kolidującego śledzenia.
  disable_tracking:
    pipelines:
      - __default__
      - data_processing
      - feature_engineering
      - modeling
      - optimization
